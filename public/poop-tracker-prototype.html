<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plop Prototype - Bowel Movement Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Custom styles for the radio buttons to look like selectable cards */
        .type-radio:checked + div {
            border-color: #3b82f6; /* blue-500 */
            background-color: #eff6ff; /* blue-50 */
            transform: scale(1.05);
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1);
        }
        .vol-radio:checked + div {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
            transform: scale(1.05);
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }
        /* Hide scrollbar for horizontal scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 font-sans flex items-center justify-center">

<div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden">
    <!-- Header -->
    <div class="bg-blue-600 text-white p-5 text-center">
        <h1 class="text-2xl font-bold tracking-tight">💩 Plop Prototype</h1>
        <p class="text-sm text-blue-100 mt-1">UI/UX 概念展示 (獨立檔案，不影響原系統)</p>
    </div>

    <div class="p-6 space-y-8">
        
        <!-- Section 1: Data Entry -->
        <div>
            <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center">
                <span class="bg-blue-100 text-blue-600 w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2">1</span>
                這次的份量是多少？
            </h2>
            <div class="grid grid-cols-3 gap-3">
                <!-- Volume Options -->
                <label class="cursor-pointer">
                    <input type="radio" name="volume" value="0.25" class="vol-radio hidden">
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center font-bold text-gray-600 transition-all hover:bg-gray-50">
                        1/4
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="volume" value="0.5" class="vol-radio hidden">
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center font-bold text-gray-600 transition-all hover:bg-gray-50">
                        1/2
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="volume" value="0.75" class="vol-radio hidden">
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center font-bold text-gray-600 transition-all hover:bg-gray-50">
                        3/4
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="volume" value="1" class="vol-radio hidden" checked>
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center font-bold text-gray-600 transition-all hover:bg-gray-50">
                        1
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="volume" value="1.5" class="vol-radio hidden">
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center font-bold text-gray-600 transition-all hover:bg-gray-50">
                        1.5
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="volume" value="2" class="vol-radio hidden">
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center font-bold text-gray-600 transition-all hover:bg-gray-50">
                        2
                    </div>
                </label>
            </div>
        </div>

        <div>
            <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center">
                <span class="bg-blue-100 text-blue-600 w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2">2</span>
                形狀像什麼？
            </h2>
            <div class="flex overflow-x-auto pb-4 gap-3 snap-x no-scrollbar">
                <!-- Type 1 -->
                <label class="cursor-pointer snap-center shrink-0 w-24">
                    <input type="radio" name="type" value="1" class="type-radio hidden">
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center transition-all h-full flex flex-col items-center justify-center bg-white">
                        <span class="text-3xl mb-2">🪨</span>
                        <span class="text-xs font-bold text-gray-700">Type 1</span>
                        <span class="text-[10px] text-gray-500 mt-1">硬球狀</span>
                    </div>
                </label>
                <!-- Type 2 -->
                <label class="cursor-pointer snap-center shrink-0 w-24">
                    <input type="radio" name="type" value="2" class="type-radio hidden">
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center transition-all h-full flex flex-col items-center justify-center bg-white">
                        <span class="text-3xl mb-2">🥜</span>
                        <span class="text-xs font-bold text-gray-700">Type 2</span>
                        <span class="text-[10px] text-gray-500 mt-1">凹凸香腸</span>
                    </div>
                </label>
                <!-- Type 3 -->
                <label class="cursor-pointer snap-center shrink-0 w-24">
                    <input type="radio" name="type" value="3" class="type-radio hidden">
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center transition-all h-full flex flex-col items-center justify-center bg-white">
                        <span class="text-3xl mb-2">🌭</span>
                        <span class="text-xs font-bold text-gray-700">Type 3</span>
                        <span class="text-[10px] text-gray-500 mt-1">裂紋香腸</span>
                    </div>
                </label>
                <!-- Type 4 -->
                <label class="cursor-pointer snap-center shrink-0 w-24">
                    <input type="radio" name="type" value="4" class="type-radio hidden" checked>
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center transition-all h-full flex flex-col items-center justify-center bg-white">
                        <span class="text-3xl mb-2">🍌</span>
                        <span class="text-xs font-bold text-gray-700">Type 4</span>
                        <span class="text-[10px] text-gray-500 mt-1">平滑柔軟</span>
                    </div>
                </label>
                <!-- Type 5 -->
                <label class="cursor-pointer snap-center shrink-0 w-24">
                    <input type="radio" name="type" value="5" class="type-radio hidden">
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center transition-all h-full flex flex-col items-center justify-center bg-white">
                        <span class="text-3xl mb-2">☁️</span>
                        <span class="text-xs font-bold text-gray-700">Type 5</span>
                        <span class="text-[10px] text-gray-500 mt-1">柔軟塊狀</span>
                    </div>
                </label>
                <!-- Type 6 -->
                <label class="cursor-pointer snap-center shrink-0 w-24">
                    <input type="radio" name="type" value="6" class="type-radio hidden">
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center transition-all h-full flex flex-col items-center justify-center bg-white">
                        <span class="text-3xl mb-2">🥣</span>
                        <span class="text-xs font-bold text-gray-700">Type 6</span>
                        <span class="text-[10px] text-gray-500 mt-1">糊狀</span>
                    </div>
                </label>
                <!-- Type 7 -->
                <label class="cursor-pointer snap-center shrink-0 w-24">
                    <input type="radio" name="type" value="7" class="type-radio hidden">
                    <div class="border-2 border-gray-200 rounded-2xl p-3 text-center transition-all h-full flex flex-col items-center justify-center bg-white">
                        <span class="text-3xl mb-2">💧</span>
                        <span class="text-xs font-bold text-gray-700">Type 7</span>
                        <span class="text-[10px] text-gray-500 mt-1">水狀</span>
                    </div>
                </label>
            </div>
        </div>

        <button class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-colors shadow-lg shadow-blue-200 active:scale-95">
            記錄這筆資料
        </button>

        <hr class="border-gray-100">

        <!-- Section 2: Report -->
        <div class="bg-gray-50 -mx-6 -mb-6 p-6 rounded-b-3xl">
            <h2 class="text-lg font-bold text-gray-800 mb-1">📊 本週趨勢報表</h2>
            <p class="text-xs text-gray-500 mb-4">高度 = 份量 (Volume) | 顏色 = 形狀 (Type)</p>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <canvas id="poopChart" height="220"></canvas>
            </div>

            <!-- Legend -->
            <div class="mt-4 flex flex-wrap gap-3 text-xs justify-center font-medium text-gray-600">
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#8D6E63] mr-1.5"></span> 便秘 (Type 1-2)</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#4CAF50] mr-1.5"></span> 理想 (Type 3-4)</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#FFB300] mr-1.5"></span> 腹瀉 (Type 5-7)</div>
            </div>
            
            <div class="mt-5 p-4 bg-blue-50/80 border border-blue-100 text-blue-800 text-sm rounded-2xl leading-relaxed">
                <strong>💡 洞察範例：</strong><br/>
                這週三雖然大便形狀很健康（綠色），但份量很少（1/4）；而週五份量極多（2），但形狀偏水狀（黃色）。
            </div>
        </div>

    </div>
</div>

<script>
    // Chart.js Setup
    const ctx = document.getElementById('poopChart').getContext('2d');
    
    // Define colors based on Bristol Type
    const getColorForType = (type) => {
        if (type <= 2) return '#8D6E63'; // Brown (Constipation)
        if (type <= 4) return '#4CAF50'; // Green (Healthy)
        return '#FFB300'; // Amber/Yellow (Diarrhea)
    };

    // Mock Data based on user's scenario
    const mockData = [
        { day: '週一', volume: 0.5, type: 2 },
        { day: '週二', volume: 1.0, type: 3 },
        { day: '週三', volume: 0.25, type: 4 }, // 健康但份量少
        { day: '週四', volume: 1.5, type: 4 },
        { day: '週五', volume: 2.0, type: 6 }, // 份量多但偏水狀
        { day: '週六', volume: 1.0, type: 4 },
        { day: '週日', volume: 0.75, type: 1 },
    ];

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: mockData.map(d => d.day),
            datasets: [{
                label: '份量 (Volume)',
                data: mockData.map(d => d.volume),
                backgroundColor: mockData.map(d => getColorForType(d.type)),
                borderRadius: 6,
                borderSkipped: false,
                barPercentage: 0.6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(17, 24, 39, 0.9)',
                    padding: 12,
                    cornerRadius: 8,
                    callbacks: {
                        label: function(context) {
                            const dataPoint = mockData[context.dataIndex];
                            let volStr = dataPoint.volume;
                            if(volStr === 0.25) volStr = '1/4';
                            if(volStr === 0.5) volStr = '1/2';
                            if(volStr === 0.75) volStr = '3/4';
                            
                            return `份量: ${volStr} | 形狀: Type ${dataPoint.type}`;
                        }
                    }
                }
            },
            scales: {
                x: {
                    grid: { display: false, drawBorder: false }
                },
                y: {
                    beginAtZero: true,
                    max: 2.2,
                    grid: {
                        color: '#f3f4f6',
                        drawBorder: false,
                    },
                    ticks: {
                        stepSize: 0.5,
                        font: { size: 10 },
                        color: '#9ca3af',
                        callback: function(value) {
                            if(value === 0.25) return '1/4';
                            if(value === 0.5) return '1/2';
                            if(value === 0.75) return '3/4';
                            if(value === 1) return '1';
                            if(value === 1.5) return '1.5';
                            if(value === 2) return '2';
                            return value === 0 ? '0' : '';
                        }
                    }
                }
            }
        }
    });
</script>
</body>
</html>
